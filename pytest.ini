[pytest]
# The workshop suite drives the real console server over HTTP. Markers:
#   live  -> tests that invoke a real model (skipped unless WORKSHOP_E2E_LIVE=1)
markers =
    live: end-to-end test that invokes a real model (opt in with WORKSHOP_E2E_LIVE=1)
testpaths =
    e2e
    orchestrator
    orchestrator-agent
    interactive-api
    console
    metrics-api
    usecase-sample-to-mcp
    usecase-critter-lab
    starter-agent
addopts = -ra
